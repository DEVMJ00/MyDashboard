<script>
  // Crée un élément <p>
  const p = document.createElement('p');

  // Formate la date « jour mois année » en français
  const options = { weekday : 'long', day: 'numeric', month: 'long', year: 'numeric' };
  const today   = new Date();
  const formattedDate = new Intl.DateTimeFormat('fr-FR', options).format(today);

  // Ajoute le texte dans le paragraphe
  p.textContent = `${formattedDate}`;

  // Insère le paragraphe dans le footer
  // Ici on suppose que le footer possède l’id « site-footer ».
  const footer = document.getElementById('site-footer') || document.querySelector('footer');
  if (footer) {
    footer.appendChild(p);
  } else {
    // Si aucun footer n’est trouvé, on l’ajoute à la fin du body comme secours
    document.body.appendChild(p);
  }
</script>
